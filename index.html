<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ponto Pro</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
padding:30px;
}

.container{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:350px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#6366f1;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#4f46e5;
}

</style>

</head>

<body>

<div class="container">

<h2>Ponto Pro</h2>

<label>Entrada</label>
<input type="time" id="entrada">

<label>Saída Almoço</label>
<input type="time" id="almocoSai">

<label>Volta Almoço</label>
<input type="time" id="almocoVolta">

<label>Saída</label>
<input type="time" id="saida">

<button onclick="registrar()">Registrar</button>

</div>

<script src="script.js"></script>

</body>
</html>
