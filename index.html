<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ponto Pro</title>

<!-- Estilos para layout e botões -->
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f5f5f5;
    }
    #app {
        max-width: 400px;
        margin: auto;
        padding: 20px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    h2 {
        text-align: center;
        color: #333;
    }
    #status, #horaAtual, #horasFeitas, #horasFaltantes, #horasExtra {
        margin: 10px 0;
        font-weight: bold;
        text-align: center;
        color: #555;
    }
    #botoes {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
    }
    button {
        padding: 10px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background-color: #45a049;
    }
</style>

</head>

<body>

<div id="app">
    <h2>Ponto Pro</h2>
    <p id="status">Aguardando registro...</p>
    <!-- NOVOS ELEMENTOS PARA HORAS -->
    <p id="horaAtual">Horário do registro: --:--:--</p>
    <p id="horasFeitas">Horas trabalhadas: 0h 0m</p>
    <p id="horasFaltantes">Horas faltantes: 8h 0m</p>
    <p id="horasExtra">Horas extras: 0h 0m</p>

    <div id="botoes">
        <button onclick="registrarEntrada()">Entrada</button>
        <button onclick="registrarSaidaAlmoco()">Saída Almoço</button>
        <button onclick="registrarVoltaAlmoco()">Volta Almoço</button>
        <button onclick="registrarSaida()">Saída</button>
    </div>
</div>

<script>
const jornada = 8; // horas padrão
let modoTeste = true;

let dados = JSON.parse(localStorage.getItem("dados")) || {
    dias: {},
    saldoTotal: 0
};

let hoje = new Date().toLocaleDateString();

if(!dados.dias[hoje] || modoTeste){
    dados.dias[hoje] = {
        entrada: null,
        saidaAlmoco: null,
        voltaAlmoco: null,
        saida: null,
        gps: null,
        horas: 0,
        extra: 0
    };
}

function salvar(){
    localStorage.setItem("dados", JSON.stringify(dados));
}

function agora(){
    return new Date().toLocaleTimeString();
}

// FUNÇÃO PARA CALCULAR HORAS TRABALHADAS, FALTANTES E EXTRAS
function calcularHoras() {
    let entrada = dados.dias[hoje].entrada;
    let almocoSai = dados.dias[hoje].saidaAlmoco;
    let almocoVolta = dados.dias[hoje].voltaAlmoco;
    let saida = dados.dias[hoje].saida;

    if(!entrada) return;

    function horaParaMinutos(hora){
        let [h,m,s] = hora.split(":").map(Number);
        return h*60 + m + (s||0)/60;
    }

    let minutosTrabalhados = 0;

    if(entrada && saida){
        minutosTrabalhados = horaParaMinutos(saida) - horaParaMinutos(entrada);
        if(almocoSai && almocoVolta){
            minutosTrabalhados -= (horaParaMinutos(almocoVolta) - horaParaMinutos(almocoSai));
        }
    }

    let faltantes = jornada*60 - minutosTrabalhados;
    let extra = minutosTrabalhados - jornada*60;

    document.getElementById("horaAtual").innerText = "Horário do registro: " + agora();
    document.getElementById("horasFeitas").innerText = `Horas trabalhadas: ${Math.floor(minutosTrabalhados/60)}h ${Math.floor(minutosTrabalhados%60)}m`;
    document.getElementById("horasFaltantes").innerText = `Horas faltantes: ${faltantes>0?Math.floor(faltantes/60)+"h "+Math.floor(faltantes%60)+"m":"0h 0m"}`;
    document.getElementById("horasExtra").innerText = `Horas extras: ${extra>0?Math.floor(extra/60)+"h "+Math.floor(extra%60)+"m":"0h 0m"}`;
}

// REGISTROS DE PONTO
function registrarEntrada(){
    dados.dias[hoje].entrada = agora();
    dados.dias[hoje].gps = "teste";
    salvar();
    enviarServidor();
    document.getElementById("status").innerText = "Entrada registrada";
    calcularHoras();
}

function registrarSaidaAlmoco(){
    dados.dias[hoje].saidaAlmoco = agora();
    salvar();
    enviarServidor();
    document.getElementById("status").innerText = "Saída almoço registrada";
    calcularHoras();
}

function registrarVoltaAlmoco(){
    dados.dias[hoje].voltaAlmoco = agora();
    salvar();
    enviarServidor();
    document.getElementById("status").innerText = "Volta almoço registrada";
    calcularHoras();
}

function registrarSaida(){
    dados.dias[hoje].saida = agora();
    salvar();
    enviarServidor();
    document.getElementById("status").innerText = "Saída registrada";
    calcularHoras();
}

// ENVIO PARA GOOGLE SHEETS
function enviarServidor(){
    fetch("https://script.google.com/macros/s/AKfycbzLc9b1aC2kRlGjL9LYrzaEnBcT65CWC76zhKc_Wig_qJodPuzOOGeYbMqa33sxrBo/exec", {
        method: "POST",
        body: JSON.stringify({
            data: hoje,
            entrada: dados.dias[hoje].entrada,
            almocoSai: dados.dias[hoje].saidaAlmoco,
            almocoVolta: dados.dias[hoje].voltaAlmoco,
            saida: dados.dias[hoje].saida,
            saldo: dados.saldoTotal,
            geo: dados.dias[hoje].gps
        })
    })
    .then(res => res.text())
    .then(res => console.log(res))
    .catch(err => console.log(err));
}

// MOSTRAR HORAS AO CARREGAR A PÁGINA
window.onload = ()=>{
    if(dados.dias[hoje].entrada) calcularHoras();
};
</script>

</body>
</html>
