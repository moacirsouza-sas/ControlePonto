<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width">

<title>Ponto Digital</title>

<style>

body{

font-family:Arial;
text-align:center;
background:#f2f2f2;

}

button{

width:90%;
padding:15px;
margin:5px;
font-size:18px;

}

.caixa{

background:white;
margin:10px;
padding:10px;
border-radius:10px;

}

</style>

</head>

<body>

<h2>Ponto Digital</h2>

<div class="caixa">

<button onclick="registrarEntrada()">
Entrada
</button>

<button onclick="registrarSaidaAlmoco()">
Saída Almoço
</button>

<button onclick="registrarVoltaAlmoco()">
Volta Almoço
</button>

<button onclick="registrarSaida()">
Saída
</button>

</div>

<div class="caixa">

Horas: <b id="horas">0</b> h
<br><br>

Extra: <b id="extra">0</b> h
<br><br>

Saldo Total: <b id="saldo">0</b> h
<br><br>

Almoço: <b id="almoco">0</b>
<br><br>

GPS:
<br>
<b id="gps">-</b>

</div>

<div class="caixa">

<button onclick="exportar()">
Exportar Backup
</button>

<br><br>

<input type="file" onchange="importar(event)">

</div>

<script src="script.js"></script>

</body>

</html>
