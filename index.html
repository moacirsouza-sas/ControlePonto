<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ponto Pro</title>

<link rel="stylesheet" href="css/style.css">

<!-- Biblioteca do gráfico -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Scripts do projeto -->
<script src="js/script.js" defer></script>
<script src="js/charts.js" defer></script>

</head>

<body>

<header>

<h1>Ponto Pro</h1>

</header>

<main class="container">

<!-- REGISTRO DE PONTO -->
<section class="card">

<h3>Registro de Ponto</h3>

<label for="entrada">Entrada</label>
<input type="time" id="entrada">

<label for="almocoSai">Saída Almoço</label>
<input type="time" id="almocoSai">

<label for="almocoVolta">Volta Almoço</label>
<input type="time" id="almocoVolta">

<label for="saida">Saída</label>
<input type="time" id="saida">

<div class="botoes">

<button onclick="registrar()">Registrar</button>

<button onclick="exportarCSV()">Exportar CSV</button>

</div>

</section>


<!-- HISTÓRICO -->
<section class="card">

<h3>Histórico</h3>

<table id="tabela">

<thead>

<tr>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>
<th>Saldo</th>
</tr>

</thead>

<tbody></tbody>

</table>

</section>


<!-- GRÁFICO -->
<section class="card">

<h3>Gráfico de Horas</h3>

<canvas id="graficoHoras"></canvas>

</section>

</main>

</body>
</html>
