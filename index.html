<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ponto Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <!-- CARD DE REGISTRO -->
    <div class="card">
        <h2>Ponto Pro</h2>

        <div class="status-grid">
            <p id="status">Aguardando registro...</p>
            <p id="horaAtual">--:--:--</p>
            <p id="horasFeitas">0h 0m</p>
            <p id="horasFaltantes">0h 0m</p>
            <p id="horasExtra">0h 0m</p>
        </div>

        <div class="botoes-grid">
            <button onclick="registrarEntrada()">Entrada</button>
            <button onclick="registrarSaidaAlmoco()">Saída Almoço</button>
            <button onclick="registrarVoltaAlmoco()">Volta Almoço</button>
            <button onclick="registrarSaida()">Saída</button>
        </div>
    </div>

    <!-- CARD DE HISTÓRICO -->
    <div class="card">
        <h3>Histórico</h3>
        <table id="tabela">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Entrada</th>
                    <th>Saída</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="exportarCSV()">Exportar CSV</button>
    </div>

    <!-- CARD DE GRÁFICO -->
    <div class="card">
        <h3>Gráfico de Horas</h3>
        <canvas id="graficoHoras"></canvas>
    </div>

</div>

<script src="script.js"></script>
<script src="charts.js"></script>

</body>
</html>
