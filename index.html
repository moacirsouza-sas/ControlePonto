<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ponto Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Ponto Pro</h1>

<div class="status" id="status">
Aguardando registro...
</div>

<div class="relogio">
Horário do registro:
<span id="horaRegistro">--:--:--</span>
</div>

<div class="cards">

<div class="card">
<h3>Horas Trabalhadas</h3>
<p id="horasTrabalhadas">0h 0m</p>
</div>

<div class="card">
<h3>Horas Faltantes</h3>
<p id="horasFaltantes">0h 0m</p>
</div>

<div class="card">
<h3>Horas Extras</h3>
<p id="horasExtras">0h 0m</p>
</div>

</div>

<div class="botoes">

<button onclick="registrar('entrada')">
Entrada
</button>

<button onclick="registrar('almocoSai')">
Saída Almoço
</button>

<button onclick="registrar('almocoVolta')">
Volta Almoço
</button>

<button onclick="registrar('saida')">
Saída
</button>

</div>

<h2>Histórico</h2>

<table>

<thead>

<tr>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>
<th>Saldo</th>
</tr>

</thead>

<tbody id="historico"></tbody>

</table>

<button class="exportar" onclick="exportarCSV()">
Exportar CSV
</button>

<h2>Gráfico de Horas</h2>

<canvas id="grafico"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
