<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ponto Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h2>Ponto Pro</h2>

<div class="card">

<label>Entrada</label>
<input type="time" id="entrada">

<label>Saída Almoço</label>
<input type="time" id="almocoSai">

<label>Volta Almoço</label>
<input type="time" id="almocoVolta">

<label>Saída</label>
<input type="time" id="saida">

<button onclick="registrar()">Registrar</button>

<button onclick="exportarCSV()">Exportar CSV</button>

</div>

<div class="card">

<h3>Histórico</h3>

<table id="tabela">

<thead>

<tr>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>
<th>Saldo</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="card">

<h3>Gráfico de Horas</h3>

<canvas id="graficoHoras"></canvas>

</div>

</div>

<script src="script.js"></script>
<script src="charts.js"></script>

</body>
</html>
